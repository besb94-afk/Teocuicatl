<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hydra Sublenguaje</title>
  <script src="https://unpkg.com/hydra-synth"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100%;
      background: black;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
    }

    #input {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 600px;
      height: 80px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      font-size: 18px;
      border: 2px solid white;
      border-radius: 10px;
      padding: 10px;
      z-index: 10;
      backdrop-filter: blur(4px);
      resize: none;
    }
  </style>
</head>
<body>
  <textarea id="input" placeholder="Escribe: pabaras y letras cortas"></textarea>

  <script>
    const hydra = new Hydra({ detectAudio: false });

    const palabras = {
Teocuicatl=osc(15,3.3,200).modulate(o0,0.5).mult(shape(0)).rotate(45,0.5)
Teponaztli=noise().modulate(o0,0.5).rotate(45,0.5).scale(2).blend(o1,0.1)
Huehuetl=osc(10,5,0.5).modulate(o0,0.5).scale([1,2,0.4,2,0.3])
Xipetotec=noise(100,0.5,60).modulate(o0,0.5).
Mexi=noise(1000,20,30).modulate(o0,0.5)
Tezcatlipoca=osc(500,55,30).modulate(o0,0.5)
CeAcatl=osc(4,500,5).modulate(o0,0.5)
Tlallocan=noise(50,50,50).modulate(o0,0.5)
Mictlan=noise(20,5,5).modulate(o0,0.5)
Chicomoztoc=noise(40,0.5).diff(osc(3,0.5,4)).modulateRepeat(noise(4,0.5),0.9).rotate(0.005).scale([1,2,0.4,2,0.3].fast(20))
Teocuicatl.out()
Teponaztli.out()
Huehuetl.out()
Xipetotec.out()
Mexi.out()
Tezcatlipoca.out()
CeAcatl.out()
Tlallocan.out()
Mictlan.out()
Chicomoztoc.out()
magt : () => {
  osc(40,0.5,() => a.fft[0]*200).out(o2)
  let shape = osc(60, 0.1, 2)
    .mult(noise(1, 4))
    .rotate(() => (Math.random() - 0.5) * 0.5 + Math.sin(time * 0.2) * 0.2)
  shape.out(o0)
  return shape
},
};

    const input = document.getElementById("input");

    input.addEventListener("input", () => {
      const texto = input.value.toLowerCase().trim();

      // Si contiene comas: modulación encadenada
      if (texto.includes(",")) {
        const modWords = texto.split(",").map(w => w.trim()).filter(w => palabras[w]);
        if (modWords.length >= 2) {
          let base = palabras[modWords[0]]();
          for (let i = 1; i < modWords.length; i++) {
            base = palabras[modWords[i]]().modulate(base, 0.5 + 0.3 * Math.random()); // modulación aleatoria
          }
          base.out();
          return;
        }
      }

      // Si contiene comas: modulación encadenada
      if (texto.includes("x")) {
        const modWords = texto.split(",").map(w => w.trim()).filter(w => palabras[w]);
        if (modWords.length >= 2) {
          let base = palabras[modWords[0]]();
          for (let i = 1; i < modWords.length; i++) {
            base = palabras[modWords[i]]().modulateScale(base, 0.5 + 0.3 * Math.random()); // modulación aleatoria
          }
          base.out();
          return;
        }
      }

      // Si no hay coma, renderiza todo en capas independientes
      const entradas = texto.split(/\s+/).map(w => w.trim()).filter(w => palabras[w]);
      if (entradas.length > 0) {
        // Componer blend entre todas
        let comp = palabras[entradas[0]]();
        for (let i = 1; i < entradas.length; i++) {
          comp = comp.diff(palabras[entradas[i]](), 0.5);
        }
        comp.out();
      }
    });
  </script>
</body>
</html>
